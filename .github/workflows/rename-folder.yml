name: Rename folder my-project to dx-logis-playground

on:
  workflow_dispatch:

jobs:
  rename:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Rename folder
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git mv my-project dx-logis-playground
          git commit -m 'refactor: rename my-project -> dx-logis-playground'
          git push
